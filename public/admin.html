<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>관리자 페이지</title>
</head>
<body>
    <div class="container">
        <header>
            <h2>관리자 페이지</h2>
            <nav>
                <ul>
                    <li><a href="/main">메인 페이지</a></li>
                    <li><a href="/logout">로그아웃</a></li>
                </ul>
            </nav>
        </header>
        <div class="admin-content">
            <h3>계정 생성</h3>
            <form id="create-account-form">
                <label for="new-username">아이디</label>
                <input type="text" id="new-username" name="username" placeholder="새 아이디를 입력하세요" required>
                <label for="new-password">비밀번호</label>
                <input type="password" id="new-password" name="password" placeholder="새 비밀번호를 입력하세요" required>
                <label for="role">역할</label>
                <select name="role" id="role">
                    <option value="user">사용자</option>
                    <option value="admin">관리자</option>
                </select>
                <button type="submit">생성</button>
            </form>
            <div id="message-box" style="display: none; color: red; margin-top: 10px;"></div>
            <h3>사용자 목록</h3>
            <table>
                <thead>
                    <tr>
                        <th>아이디</th>
                        <th>역할</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="user-list">
                    <!-- 사용자 목록이 여기에 표시됩니다. -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 계정 목록을 불러오는 함수
        function loadUserList() {
            fetch('/users')
                .then(response => response.json())
                .then(users => {
                    const userList = document.getElementById('user-list');
                    userList.innerHTML = ''; // 기존 목록 비우기

                    users.forEach(user => {
                        const row = document.createElement('tr');
                        const usernameCell = document.createElement('td');
                        const roleCell = document.createElement('td');
                        const actionCell = document.createElement('td');

                        usernameCell.textContent = user.username;
                        roleCell.textContent = user.role;

                        const deleteButton = document.createElement('button');
                        deleteButton.textContent = '삭제';
                        deleteButton.addEventListener('click', () => deleteUser(user.username));

                        actionCell.appendChild(deleteButton);
                        row.appendChild(usernameCell);
                        row.appendChild(roleCell);
                        row.appendChild(actionCell);
                        userList.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error loading user list:', error);
                });
        }

        // 계정 생성 폼 제출 이벤트 핸들러
        document.getElementById('create-account-form').addEventListener('submit', function(event) {
            event.preventDefault(); // 폼 제출 기본 동작 막기

            const username = document.getElementById('new-username').value;
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('role').value;

            fetch('/create-account', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password, role })
            })
            .then(response => {
                if (response.ok) {
                    document.getElementById('message-box').style.display = 'none'; // 에러 메시지 숨기기
                    loadUserList(); // 계정 생성 후 목록 업데이트
                } else {
                    return response.json().then(data => {
                        document.getElementById('message-box').textContent = data.message;
                        document.getElementById('message-box').style.display = 'block';
                    });
                }
            })
            .catch(error => {
                console.error('Error creating account:', error);
                document.getElementById('message-box').textContent = '계정 생성 중 오류가 발생했습니다.';
                document.getElementById('message-box').style.display = 'block';
            });
        });

        // 계정 삭제 함수
        function deleteUser(username) {
            fetch(`/delete-account/${username}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok) {
                    loadUserList(); // 계정 삭제 후 목록 업데이트
                } else {
                    return response.json().then(data => {
                        throw new Error(data.message);
                    });
                }
            })
            .catch(error => {
                console.error('Error deleting account:', error);
            });
        }

        // 페이지 로드 시 계정 목록 불러오기
        window.onload = loadUserList;
    </script>
</body>
</html>
