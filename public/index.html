<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>로그인</title>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>로그인</h2>
            <form id="login-form">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                <button type="submit">로그인</button>
            </form>
            <div id="error-message" style="display: none; color: red; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault(); // 폼의 기본 제출 동작을 막음

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Fetch API를 사용하여 비동기 POST 요청
            fetch('/.netlify/functions/login', { // Netlify Functions 경로로 변경
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('네트워크 응답이 정상이 아닙니다.');
                }
                return response.json();
            })
            .then(data => {
                if (data.message && data.message !== '로그인 성공') {
                    // 서버에서 오류 메시지를 받은 경우
                    document.getElementById('error-message').textContent = data.message;
                    document.getElementById('error-message').style.display = 'block';
                } else {
                    // 로그인 성공 시 메인 페이지로 리다이렉트
                    window.location.href = '/main';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('error-message').textContent = '로그인 중 오류가 발생했습니다.';
                document.getElementById('error-message').style.display = 'block';
            });
        });
    </script>
</body>
</html>
