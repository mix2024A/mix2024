<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css"> <!-- CSS 파일 경로 확인 -->
    <title>메인 페이지</title>
</head>
<body>
    <div class="container">
        <header class="main-header">
            <div class="logo">
                <h1>Auto Suggest</h1>
                <p>Rank Up Service for</p>
            </div>
            <nav>
                <ul id="nav-list">
                    <!-- 관리자 페이지 버튼은 JavaScript로 동적 추가 -->
                    <li><a href="/logout">로그아웃</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="keyword-section">
                <div class="summary">
                    <span>등록 키워드: <b>325</b></span>
                    <span>전연속: <b>0</b></span>
                    <span>삭제 가능한 키워드수: <b>312</b></span>
                </div>
                <div class="keyword-search">
                    <input type="text" placeholder="검색어 입력">
                    <button>검색</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>순위</th>
                            <th>순위유형 키워드</th>
                            <th>노출 키워드</th>
                            <th>메모</th>
                            <th>순출</th>
                            <th>등록일</th>
                            <th>만료일</th>
                            <th>상태</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>-</td>
                            <td>수술전후병원</td>
                            <td>수술전후병원 분류전환병원 인계</td>
                            <td></td>
                            <td>2</td>
                            <td>2024-08-07</td>
                            <td>2024-08-07</td>
                            <td>정상</td>
                            <td><a href="#">수정</a> <a href="#">삭제</a></td>
                        </tr>
                        <!-- 더 많은 데이터 행 추가 가능 -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script>
        // 사용자 정보를 가져오는 함수
        function getUserInfo() {
            fetch('/user-info')
                .then(response => response.json())
                .then(data => {
                    const navList = document.getElementById('nav-list');
                    
                    // 관리자인 경우에만 관리자 페이지 링크 추가
                    if (data.role === 'admin') {
                        const adminLink = document.createElement('li');
                        adminLink.innerHTML = '<a href="/admin">관리자 페이지</a>';
                        navList.insertBefore(adminLink, navList.firstChild);
                    }

                    // 환영 메시지 추가
                    const welcomeMessage = document.createElement('div');
                    welcomeMessage.innerHTML = `<h3>환영합니다, ${data.username}!</h3>`;
                    document.querySelector('.container').insertBefore(welcomeMessage, document.querySelector('main'));
                })
                .catch(error => {
                    console.error('Error fetching user info:', error);
                });
        }

        // 페이지 로드 시 사용자 정보 가져오기
        window.onload = getUserInfo;
    </script>
</body>
</html>
